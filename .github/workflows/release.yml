name: Release macOS app

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/ci.yml

  publish-macos:
    name: Publish macOS (Apple Silicon)
    needs: validate
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CI: true
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: aarch64-apple-darwin

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Cargo check
        run: npm run cargo:check

      - name: Cargo test
        run: npm run cargo:test

      - name: Cargo clippy
        run: npm run cargo:clippy

      - name: Derive release metadata
        id: release_meta
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          PRERELEASE=false

          if [[ "$TAG_NAME" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Configure Apple signing and notarization
        id: configure_apple
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_P8_BASE64 KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets: ${missing[*]}" >&2
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/friday-signing.keychain-db"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          CERT_ID="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F\" '/Developer ID Application/ { print $2; exit }')"

          if [ -z "$CERT_ID" ]; then
            echo "Unable to resolve a Developer ID Application signing identity from APPLE_CERTIFICATE." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2
            exit 1
          fi

          echo "Using signing identity: $CERT_ID"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          rm -f "$CERTIFICATE_PATH"

      - name: Prepare signed macOS runtime resources
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/prepare-macos-signed-resources.sh --patch-tauri-config

      - name: Build and upload release assets
        id: build_release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag_name }}
          releaseName: Friday ${{ steps.release_meta.outputs.tag_name }}
          releaseDraft: true
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generateReleaseNotes: true
          releaseBody: |
            Automated release for `${{ steps.release_meta.outputs.tag_name }}`.

            Download the signed and notarized macOS assets below for Apple Silicon.
          releaseCommitish: ${{ github.sha }}
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin

      - name: Notarize disk images and refresh draft assets
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          mapfile -t DMGS < <(find src-tauri/target -type f -path "*/release/bundle/dmg/*.dmg" | sort)

          if [ "${#DMGS[@]}" -eq 0 ]; then
            echo "No DMG artifacts were produced." >&2
            exit 1
          fi

          for dmg in "${DMGS[@]}"; do
            echo "Signing disk image: $dmg"
            codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$dmg"

            echo "Submitting disk image for notarization: $dmg"
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait

            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"

            gh release upload "$TAG_NAME" "$dmg" --clobber
          done

      - name: Validate signed and notarized artifacts
        shell: bash
        run: |
          APP_BUNDLE="$(find src-tauri/target -type d -path "*/release/bundle/macos/*.app" -print -quit)"

          if [ -z "$APP_BUNDLE" ]; then
            echo "No macOS app bundle was produced." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "$APP_BUNDLE"
          codesign -dvv --entitlements :- "$APP_BUNDLE"
          xcrun stapler validate "$APP_BUNDLE"
          spctl --assess --type execute --verbose=4 "$APP_BUNDLE"

          mapfile -t DMGS < <(find src-tauri/target -type f -path "*/release/bundle/dmg/*.dmg" | sort)

          if [ "${#DMGS[@]}" -eq 0 ]; then
            echo "No DMG artifacts were produced." >&2
            exit 1
          fi

          for dmg in "${DMGS[@]}"; do
            codesign --verify --verbose=4 "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"
          done

      - name: Publish validated release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.build_release.outputs.releaseId }}
          PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq .id)"
          fi

          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false \
            -F prerelease="$PRERELEASE"
