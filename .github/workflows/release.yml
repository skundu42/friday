name: Release macOS app

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-macos:
    name: Publish macOS (Apple Silicon)
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CI: true
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive release metadata
        id: release_meta
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          PRERELEASE=false

          if [[ "$TAG_NAME" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Configure macOS signing
        id: configure_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$KEYCHAIN_PASSWORD" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain

            security import certificate.p12 \
              -k build.keychain \
              -P "$APPLE_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security

            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s \
              -k "$KEYCHAIN_PASSWORD" \
              build.keychain

            CERT_ID="$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\\(.*\\)"/\\1/p' | head -n 1)"

            if [ -z "$CERT_ID" ]; then
              echo "Unable to resolve a macOS signing identity from the imported certificate." >&2
              exit 1
            fi

            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "notarization_enabled=true" >> "$GITHUB_OUTPUT"
            rm -f certificate.p12
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            echo "notarization_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing secrets are not configured. Falling back to ad-hoc signing."
          fi

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag_name }}
          releaseDraft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generateReleaseNotes: true
          releaseBody: |
            Automated release for `${{ steps.release_meta.outputs.tag_name }}`.

            Download the macOS assets below for Apple Silicon.
          releaseCommitish: ${{ github.sha }}
          args: --target aarch64-apple-darwin
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: daksha-[target]-[bundle]
