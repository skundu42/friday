name: Release macOS app

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Ensure tagged commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on origin/main." >&2
            exit 1
          fi

      - name: Validate tag and app versions
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"
          TAG_NAME="${GITHUB_REF_NAME}"
          NORMALIZED_TAG="${TAG_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match src-tauri/tauri.conf.json version ($TAURI_VERSION)." >&2
            exit 1
          fi

          if [ "$NORMALIZED_TAG" != "$TAURI_VERSION" ]; then
            echo "Tag $TAG_NAME must match the app version ($TAURI_VERSION) or be prefixed with 'v'." >&2
            exit 1
          fi

          PRERELEASE=false
          if [[ "$NORMALIZED_TAG" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "app_version=$TAURI_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  quality-gate:
    name: Run release checks
    needs: verify-tag
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test:run

      - name: Run Python worker tests
        run: npm run python:test

      - name: Run frontend build
        run: npm run build

      - name: Run Rust checks
        run: npm run cargo:check

      - name: Run Rust tests
        run: npm run cargo:test

      - name: Run Rust clippy
        run: npm run cargo:clippy

  publish-macos:
    name: Publish macOS (${{ matrix.label }})
    needs:
      - verify-tag
      - quality-gate
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
    env:
      CI: true
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure macOS signing
        id: configure_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$KEYCHAIN_PASSWORD" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain

            security import certificate.p12 \
              -k build.keychain \
              -P "$APPLE_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security

            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s \
              -k "$KEYCHAIN_PASSWORD" \
              build.keychain

            CERT_ID="$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\\(.*\\)"/\\1/p' | head -n 1)"

            if [ -z "$CERT_ID" ]; then
              echo "Unable to resolve a macOS signing identity from the imported certificate." >&2
              exit 1
            fi

            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "notarization_enabled=true" >> "$GITHUB_OUTPUT"
            rm -f certificate.p12
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            echo "notarization_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing secrets are not configured. Falling back to ad-hoc signing."
          fi

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.verify-tag.outputs.tag_name }}
          releaseDraft: false
          prerelease: ${{ needs.verify-tag.outputs.prerelease }}
          generateReleaseNotes: true
          releaseBody: |
            Automated release for `${{ needs.verify-tag.outputs.tag_name }}`.

            Download the macOS assets below for Apple Silicon.
          releaseCommitish: ${{ github.sha }}
          args: --target ${{ matrix.target }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: daksha-[target]-[bundle]

      - name: Verify bundle artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$(find "$BUNDLE_DIR" -name '*.app' | head -n 1)"
          DMG_PATH="$(find "$BUNDLE_DIR" -name '*.dmg' | head -n 1)"

          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ]; then
            echo "Expected .app and .dmg artifacts under $BUNDLE_DIR." >&2
            exit 1
          fi

          codesign --verify --deep --strict "$APP_PATH"

      - name: Run bundled Python worker runtime smoke
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$(find "$BUNDLE_DIR" -name '*.app' | head -n 1)"
          WORKER_PATH="$(find "$APP_PATH" -name 'friday_litert_worker.py' | head -n 1)"
          PYTHON_ARCHIVE_PATH="$(find "$APP_PATH" -name 'cpython-*.tar.gz' | head -n 1)"
          PYTHON_WHEEL_PATH="$(find "$APP_PATH" -name 'litert_lm_api-*.whl' | head -n 1)"

          if [ -z "$WORKER_PATH" ] || [ -z "$PYTHON_ARCHIVE_PATH" ] || [ -z "$PYTHON_WHEEL_PATH" ]; then
            echo "Missing bundled LiteRT Python worker assets in $APP_PATH." >&2
            exit 1
          fi

          python3 scripts/smoke_litert_python_worker.py \
            --ci \
            --worker-script "$WORKER_PATH" \
            --python-archive "$PYTHON_ARCHIVE_PATH" \
            --python-wheel "$PYTHON_WHEEL_PATH"

      - name: Validate notarization staples
        if: needs.verify-tag.outputs.prerelease == 'false' && steps.configure_signing.outputs.notarization_enabled == 'true'
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$(find "$BUNDLE_DIR" -name '*.app' | head -n 1)"
          DMG_PATH="$(find "$BUNDLE_DIR" -name '*.dmg' | head -n 1)"

          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
