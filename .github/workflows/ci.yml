name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: clippy

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test:run

      - name: Run frontend build
        run: npm run build

      - name: Run Rust checks
        run: npm run cargo:check

      - name: Run Rust tests
        run: npm run cargo:test

      - name: Run Rust clippy
        run: npm run cargo:clippy

  macos-package-smoke:
    name: macOS Package Smoke
    runs-on: macos-latest
    needs: quality-gate
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build unsigned macOS app bundle
        run: npm run tauri build -- --bundles app

      - name: Verify macOS bundle exists
        shell: bash
        run: |
          APP_PATH="$(find src-tauri/target/release/bundle -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Expected a .app bundle under src-tauri/target/release/bundle." >&2
            exit 1
          fi
          echo "Verified bundle: $APP_PATH"
